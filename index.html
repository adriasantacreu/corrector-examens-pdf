<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path d=%22M5 25 L95 15 L92 85 L8 92 Z%22 fill=%22%23bae6fd%22 fill-opacity=%220.8%22 /><text y=%2265%22 x=%2250%22 text-anchor=%22middle%22 font-size=%2280%22 font-weight=%22900%22 fill=%22%230369a1%22 font-family=%22cursive%22 transform=%22rotate(-5 50 50)%22>fg</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowGrading | Correcció d'exàmens</title>
    <script>
      (function() {
        try {
          const globalSaved = JSON.parse(localStorage.getItem('flowgrading_global') || '{}');
          const theme = globalSaved.theme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.backgroundColor = theme === 'dark' ? '#020617' : '#fdfdfd';
          document.documentElement.style.color = theme === 'dark' ? '#f1f5f9' : '#111827';
        } catch (e) {}
      })();
    </script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      .no-transition * {
        transition: none !important;
      }
    </style>
  </head>
  <body class="no-transition">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove no-transition class after first paint to enable smooth transitions for user actions
      window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          document.body.classList.remove('no-transition');
        }, 100);
      });
    </script>
  </body>
</html>
